<div class="flex justify-center w-full p-4">
  <div id="search-container">
    <input 
      type="text" 
      [(ngModel)]="searchText"
      (keydown.enter)="buscar()"
      placeholder="Digite sua busca..."
    />
    <div class="button-row">
      <button (click)="limpar()" class="limpar-btn">
        <ng-icon name="heroArrowPath" />
      </button>
      <button (click)="buscar()" [disabled]="!hasValue" class="achar-btn">
        <ng-icon name="heroDocumentMagnifyingGlass" />
      </button>
    </div>
  </div>
</div>

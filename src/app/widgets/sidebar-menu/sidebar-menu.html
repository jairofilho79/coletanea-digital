<!-- Overlay for mobile -->
<div class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden" *ngIf="isOpen" (click)="closeSidebar()"></div>

<!-- Sidebar for mobile only -->
<nav class="fixed top-0 left-0 h-full w-64 bg-white shadow-lg z-50 transform transition-transform duration-300
             -translate-x-full md:hidden" [class.translate-x-0]="isOpen" [class.-translate-x-full]="!isOpen">
    <div class="flex items-center justify-between p-4">
        <span class="text-lg font-bold">Menu</span>
        <button (click)="closeSidebar()" aria-label="Close menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
    <ul class="mt-8 space-y-3 px-4">
    <li class="relative flex items-center">
        <a class="hover:text-blue-600 flex items-center cursor-pointer text-base font-medium" (click)="openListaRapidaModal($event)">
            Lista Rápida
            <span
                class="ml-2 inline-flex items-center justify-center px-2 py-0.5 text-xs font-bold leading-none text-white bg-blue-600 rounded-full">
                {{ louvorList.length }}
            </span>
        </a>
    </li>
    <li>
        <a class="hover:text-blue-600 flex items-center cursor-pointer text-base font-medium" (click)="goHome()">
            Pesquisador
        </a>
    </li>
    <!-- <li>
        <a class="hover:text-blue-600 cursor-pointer text-base font-medium">Pautas</a>
    </li> -->
    <!-- <li>
        <a class="hover:text-blue-600 cursor-pointer text-base font-medium">Entrar</a>
    </li> -->
</ul>
</nav>

<!-- Hamburger button for mobile -->
<button class="fixed top-4 left-4 z-50 p-2 rounded bg-white shadow md:hidden" (click)="openSidebar()" *ngIf="!isOpen"
    aria-label="Open menu">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
</button>

<!-- Topbar for md+ screens -->
<nav class="hidden md:flex w-full bg-white shadow-lg px-8 py-4 items-center justify-between top-0 left-0 z-40">
    <span class="text-lg font-bold">Menu</span>
    <ul class="flex space-x-8">
        <li class="relative">
            <a class="hover:text-blue-600 flex items-center cursor-pointer" (click)="openListaRapidaModal($event)">
                Lista Rápida
                <span *ngIf="louvorList?.length"
                    class="ml-2 inline-flex items-center justify-center px-2 py-1 text-xs font-bold leading-none text-white bg-blue-600 rounded-full">
                    {{ louvorList.length }}
                </span>
            </a>
        </li>
        <li class="relative">
            <a class="hover:text-blue-600 flex items-center cursor-pointer" (click)="goHome()">
                Pesquisador
            </a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Pautas</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li><li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
        <li>
            <a class="hover:text-blue-600 cursor-pointer" [class.hidden]="true">Entrar</a>
        </li>
    </ul>
</nav>

<!-- Modal component, shown when showListaRapidaModal is true -->
<app-lista-rapida-modal
  *ngIf="showListaRapidaModal"
  [louvorList]="louvorList"
  (close)="closeListaRapidaModal()">
</app-lista-rapida-modal>
